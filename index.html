<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dot Race Prototype</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <main id="game-container" class="orbital-layout">
            <section class="course-orb">
                <div class="orb-shell">
                    <canvas id="raceCanvas" width="760" height="760"></canvas>
                </div>
            </section>

            <section class="telemetry-orb">
                <div class="orb-shell info-shell">
                    <div class="info-core">
                        <p class="info-kicker">RACE TELEMETRY</p>
                        <div class="headline-stack">
                            <span class="status-label">현재 속도</span>
                            <strong id="currentSpeed">1.04x</strong>
                        </div>

                        <div class="dial-grid">
                            <div class="dial-card primary">
                                <span class="status-label">레이스 상태</span>
                                <strong id="raceState">대기 중</strong>
                            </div>
                            <div class="dial-card">
                                <span class="status-label">남은 거리</span>
                                <strong id="distanceLeft">100m</strong>
                            </div>
                            <div class="dial-card">
                                <span class="status-label">선두</span>
                                <strong id="leaderName">나</strong>
                            </div>
                            <div class="dial-card">
                                <span class="status-label">내 진행</span>
                                <strong id="myProgress">0m</strong>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <section class="panel-card controls-dock">
            <h2>시뮬레이션 조작</h2>
            <label class="duration-control" for="raceDurationInput">
                <span class="status-label">레이스 길이 (초)</span>
                <input id="raceDurationInput" type="number" min="20" max="300" step="5" value="60">
            </label>
            <div id="controls">
                <button id="startBtn">레이스 시작</button>
                <button id="boostMeBtn">내 속도 올리기</button>
                <button id="boostOthersBtn">다른 레이서 속도 올리기</button>
                <button id="resetBtn">리셋</button>
                <button id="slowMeBtn">내 속도 내리기</button>
                <button id="slowOthersBtn">다른 레이서 속도 내리기</button>
            </div>

            <div id="announcement" class="announcement" aria-live="polite">
                출발 버튼을 누르면 레이스가 시작됩니다.
            </div>
        </section>

    </div>
    <script src="script.js"></script>
</body>
</html>
